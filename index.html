
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans,system-ui);background:var(--color-background-tertiary);color:var(--color-text-primary);}
.phone{width:380px;min-height:700px;background:var(--color-background-tertiary);margin:0 auto;display:flex;flex-direction:column;position:relative;}

/* AUTH */
.auth-screen{padding:2rem 1.25rem;display:flex;flex-direction:column;min-height:700px;}
.auth-hero{text-align:center;padding:2.5rem 0 2rem;}
.auth-icon{width:60px;height:60px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:26px;}
.auth-title{font-size:22px;font-weight:500;margin-bottom:6px;}
.auth-sub{font-size:14px;color:var(--color-text-secondary);line-height:1.5;}
.auth-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:16px;padding:1.5rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:5px;font-weight:500;letter-spacing:.3px;}
.field input{width:100%;padding:13px 14px;border:0.5px solid var(--color-border-secondary);border-radius:10px;font-size:16px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none;-webkit-appearance:none;}
.field input:focus{border-color:var(--color-border-primary);box-shadow:0 0 0 3px rgba(120,120,120,.1);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-main{width:100%;padding:15px;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;margin-top:.5rem;}
.btn-main:active{opacity:.85;}
.auth-link{text-align:center;margin-top:1rem;font-size:14px;color:var(--color-text-secondary);}
.auth-link span{color:var(--color-text-primary);font-weight:500;cursor:pointer;}
.otp-banner{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:12px 14px;margin-bottom:1rem;font-size:13px;color:var(--color-text-secondary);line-height:1.5;}
.otp-code{font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);margin-top:4px;}
.err{font-size:12px;color:var(--color-text-danger);margin-top:5px;}

/* APP SHELL */
.app-shell{display:flex;flex-direction:column;min-height:700px;background:var(--color-background-tertiary);}

/* TOP BAR */
.topbar{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
.topbar-title{font-size:17px;font-weight:500;flex:1;}
.topbar-trip{font-size:11px;color:var(--color-text-secondary);}
.topbar-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;overflow:hidden;}
.topbar-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

/* SCROLL CONTENT */
.scroll-area{flex:1;overflow-y:auto;padding:0 0 100px;}
.page{padding:16px;}

/* BOTTOM NAV */
.bottom-nav{background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;padding:8px 0 4px;position:sticky;bottom:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;color:var(--color-text-secondary);border:none;background:none;-webkit-tap-highlight-color:transparent;}
.nav-btn.active{color:var(--color-text-primary);}
.nav-btn i{font-size:22px;}
.nav-btn span{font-size:10px;font-weight:500;}
.nav-btn-add{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 4px;cursor:pointer;border:none;background:none;}
.add-circle{width:48px;height:48px;background:var(--color-text-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-12px;}
.add-circle i{font-size:22px;color:var(--color-background-primary);}
.add-label{font-size:10px;font-weight:500;color:var(--color-text-secondary);margin-top:2px;}

/* METRIC CARDS */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.metric{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:14px 14px 12px;}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;font-weight:500;}
.metric-val{font-size:20px;font-weight:500;}
.positive{color:#1D9E75;}
.negative{color:#D85A30;}

/* SECTION */
.section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:14px;margin-bottom:12px;overflow:hidden;}
.section-head{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;}
.section-title{font-size:14px;font-weight:500;}
.section-more{font-size:12px;color:var(--color-text-secondary);cursor:pointer;}

/* EXPENSE ROW */
.exp-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:0.5px solid var(--color-border-tertiary);}
.exp-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.exp-body{flex:1;min-width:0;}
.exp-desc{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exp-meta{font-size:12px;color:var(--color-text-secondary);margin-top:1px;}
.exp-amt{font-size:15px;font-weight:500;flex-shrink:0;}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}

/* BAR */
.bar-row{display:flex;align-items:center;gap:10px;padding:8px 16px;}
.bar-row:first-child{padding-top:4px;}
.bar-name{font-size:13px;width:56px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:6px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.bar-val{font-size:12px;font-weight:500;min-width:48px;text-align:right;flex-shrink:0;}

/* AVATAR */
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.av-sm{width:28px;height:28px;font-size:11px;}
.av-lg{width:72px;height:72px;font-size:24px;}

/* SETTLE ROW */
.settle-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-top:0.5px solid var(--color-border-tertiary);}
.settle-amt{font-size:14px;font-weight:500;margin-left:auto;flex-shrink:0;}

/* MEMBER ROW */
.member-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:0.5px solid var(--color-border-tertiary);}
.member-info{flex:1;min-width:0;}
.member-name{font-size:14px;font-weight:500;}
.member-email{font-size:12px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ADD FORM */
.form-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:14px;padding:16px;margin-bottom:12px;}
.form-field{margin-bottom:14px;}
.form-label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:5px;font-weight:500;}
.form-input{width:100%;padding:13px 14px;border:0.5px solid var(--color-border-secondary);border-radius:10px;font-size:16px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none;-webkit-appearance:none;}
.form-input:focus{border-color:var(--color-border-primary);}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.check-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.chip{display:flex;align-items:center;gap:6px;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:20px;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.chip.on{background:var(--color-background-secondary);border-color:var(--color-border-primary);font-weight:500;}
.chip input{display:none;}
.btn-submit{width:100%;padding:15px;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;margin-top:4px;}
.btn-submit:active{opacity:.85;}

/* PROFILE */
.profile-hero{text-align:center;padding:1.5rem 1rem 1rem;}
.profile-av-wrap{position:relative;display:inline-block;margin-bottom:12px;}
.av-edit{position:absolute;bottom:0;right:0;width:26px;height:26px;border-radius:50%;background:var(--color-text-primary);color:var(--color-background-primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;}
.profile-name{font-size:18px;font-weight:500;}
.profile-email{font-size:13px;color:var(--color-text-secondary);margin-top:3px;}
.btn-outline{width:100%;padding:13px;background:transparent;color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary);border-radius:12px;font-size:15px;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-outline:active{background:var(--color-background-secondary);}
.btn-danger-outline{width:100%;padding:13px;background:transparent;color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);border-radius:12px;font-size:15px;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.save-msg{font-size:13px;color:#1D9E75;text-align:center;margin-top:8px;}

/* FILTER PILLS */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.fpill{padding:7px 14px;border:0.5px solid var(--color-border-secondary);border-radius:20px;font-size:13px;white-space:nowrap;cursor:pointer;flex-shrink:0;background:var(--color-background-primary);}
.fpill.on{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary);}

/* INVITE */
.invite-row{display:flex;gap:8px;padding:12px 16px;border-top:0.5px solid var(--color-border-tertiary);}
.invite-input{flex:1;padding:11px 12px;border:0.5px solid var(--color-border-secondary);border-radius:10px;font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none;}
.invite-btn{padding:11px 14px;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:10px;font-size:14px;cursor:pointer;white-space:nowrap;}

.hidden{display:none!important;}
.del-btn{padding:6px 10px;background:transparent;color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);border-radius:8px;font-size:12px;cursor:pointer;flex-shrink:0;}
.back-btn{padding:6px 10px;background:transparent;border:none;color:var(--color-text-secondary);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;}
</style>

<div class="phone" id="app">

<!-- AUTH -->
<div class="auth-screen" id="authScreen">
  <div class="auth-hero">
    <div class="auth-icon">✈</div>
    <div class="auth-title">SplitTrip</div>
    <div class="auth-sub">Track and split travel expenses with your group.</div>
  </div>

  <div id="loginForm">
    <div class="auth-card">
      <div class="field">
        <label>Email address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
      </div>
      <button class="btn-main" onclick="sendOtp()">Send OTP</button>
    </div>
    <div class="auth-link">No account? <span onclick="showRegister()">Register</span></div>
  </div>

  <div id="otpForm" class="hidden">
    <div class="auth-card">
      <div class="otp-banner">Code sent to <strong id="otpEmailLabel"></strong><div class="otp-code" id="otpCodeHint"></div></div>
      <div class="field">
        <label>6-digit OTP</label>
        <input type="number" id="otpInput" placeholder="000000" maxlength="6" inputmode="numeric" />
        <div class="err hidden" id="otpErr">Invalid code. Try again.</div>
      </div>
      <button class="btn-main" onclick="verifyOtp()">Verify & sign in</button>
    </div>
    <div class="auth-link"><span onclick="showLogin()">← Back</span></div>
  </div>

  <div id="registerForm" class="hidden">
    <div class="auth-card">
      <div class="field field-row">
        <div><label>First name</label><input type="text" id="regFirst" placeholder="Jane" autocomplete="given-name" /></div>
        <div><label>Last name</label><input type="text" id="regLast" placeholder="Smith" autocomplete="family-name" /></div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Trip name</label>
        <input type="text" id="regTrip" placeholder="e.g. Bali 2026" />
      </div>
      <button class="btn-main" onclick="registerUser()">Create account</button>
    </div>
    <div class="auth-link">Have an account? <span onclick="showLogin()">Sign in</span></div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app-shell hidden" id="mainApp">
  <div class="topbar">
    <div style="flex:1">
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-trip" id="topbarTrip"></div>
    </div>
    <div class="topbar-avatar" id="topbarAvatar" onclick="goProfile()" style="cursor:pointer;"></div>
  </div>

  <div class="scroll-area" id="scrollArea">
    <!-- DASHBOARD -->
    <div class="page hidden" id="page-home">
      <div class="metrics" id="metricGrid"></div>
      <div class="section">
        <div class="section-head"><span class="section-title">Spending by person</span></div>
        <div id="spendBars" style="padding-bottom:10px;"></div>
      </div>
      <div class="section">
        <div class="section-head"><span class="section-title">Recent</span><span class="section-more" onclick="navTo('expenses')">See all</span></div>
        <div id="recentList"></div>
      </div>
    </div>

    <!-- EXPENSES -->
    <div class="page hidden" id="page-expenses">
      <div class="filter-row" id="filterRow">
        <div class="fpill on" onclick="filterExp('all',this)">All</div>
        <div class="fpill" onclick="filterExp('Food',this)">Food</div>
        <div class="fpill" onclick="filterExp('Transport',this)">Transport</div>
        <div class="fpill" onclick="filterExp('Accommodation',this)">Accommodation</div>
        <div class="fpill" onclick="filterExp('Activities',this)">Activities</div>
        <div class="fpill" onclick="filterExp('Other',this)">Other</div>
      </div>
      <div class="section"><div id="expList"></div></div>
    </div>

    <!-- ADD -->
    <div class="page hidden" id="page-add">
      <div class="form-card">
        <div class="form-field">
          <label class="form-label">Description</label>
          <input class="form-input" type="text" id="expDesc" placeholder="e.g. Dinner at Casa Bali" />
        </div>
        <div class="form-row-2">
          <div class="form-field">
            <label class="form-label">Amount (CAD)</label>
            <input class="form-input" type="number" id="expAmt" placeholder="0.00" inputmode="decimal" />
          </div>
          <div class="form-field">
            <label class="form-label">Date</label>
            <input class="form-input" type="date" id="expDate" />
          </div>
        </div>
        <div class="form-field">
          <label class="form-label">Category</label>
          <select class="form-input" id="expCat">
            <option>Food</option><option>Transport</option><option>Accommodation</option><option>Activities</option><option>Other</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">Paid by</label>
          <select class="form-input" id="expPaidBy"></select>
        </div>
        <div class="form-field">
          <label class="form-label">Paid for</label>
          <div class="check-group" id="expPaidFor"></div>
        </div>
        <button class="btn-submit" onclick="addExpense()">Add expense</button>
        <div class="err hidden" id="addErr" style="text-align:center;margin-top:8px;"></div>
      </div>
    </div>

    <!-- SETTLE -->
    <div class="page hidden" id="page-settle">
      <div class="metrics" id="settleMetrics"></div>
      <div class="section">
        <div class="section-head"><span class="section-title">Balances</span></div>
        <div id="balList"></div>
      </div>
      <div class="section">
        <div class="section-head"><span class="section-title">Payments to make</span></div>
        <div id="settleList"></div>
      </div>
    </div>

    <!-- MEMBERS -->
    <div class="page hidden" id="page-members">
      <div class="section">
        <div id="memberList"></div>
        <div class="invite-row">
          <input class="invite-input" type="email" id="inviteEmail" placeholder="friend@example.com" />
          <button class="invite-btn" onclick="inviteMember()">Invite</button>
        </div>
        <div class="err hidden" id="inviteMsg" style="padding:6px 16px 10px;"></div>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="page hidden" id="page-profile">
      <div class="section" style="overflow:visible;">
        <div class="profile-hero">
          <div class="profile-av-wrap">
            <div class="av av-lg" id="profileAv"></div>

          <div class="profile-name" id="profileName"></div>
          <div class="profile-email" id="profileEmailDisp"></div>
        </div>
        <div style="padding:0 16px 16px;">
          <div class="form-row-2" style="margin-bottom:10px;">
            <div class="form-field">
              <label class="form-label">First name</label>
              <input class="form-input" type="text" id="pfFirst" />
            </div>
            <div class="form-field">
              <label class="form-label">Last name</label>
              <input class="form-input" type="text" id="pfLast" />
            </div>
          </div>
          <button class="btn-submit" onclick="saveProfile()">Save changes</button>
          <div class="save-msg hidden" id="saveMsg">Profile updated.</div>
          <button class="btn-danger-outline" onclick="logout()" style="margin-top:12px;"><i class="ti ti-logout" aria-hidden="true"></i> Sign out</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nb-home" onclick="navTo('home')" aria-label="Dashboard"><i class="ti ti-layout-dashboard"></i><span>Home</span></button>
    <button class="nav-btn" id="nb-expenses" onclick="navTo('expenses')" aria-label="Expenses"><i class="ti ti-receipt"></i><span>Expenses</span></button>

  </div>
</div>

</div>

<script>
const COLORS=[{bg:'#E6F1FB',fg:'#0C447C'},{bg:'#E1F5EE',fg:'#085041'},{bg:'#FAEEDA',fg:'#633806'},{bg:'#FBEAF0',fg:'#72243E'},{bg:'#EEEDFE',fg:'#3C3489'},{bg:'#FAECE7',fg:'#993C1D'}];
const CAT_COLORS={Food:{bg:'#E1F5EE',fg:'#085041'},Transport:{bg:'#E6F1FB',fg:'#0C447C'},Accommodation:{bg:'#EEEDFE',fg:'#3C3489'},Activities:{bg:'#FAEEDA',fg:'#633806'},Other:{bg:'#F1EFE8',fg:'#444441'}};
const CAT_ICONS={Food:'ti-tools-kitchen-2',Transport:'ti-car',Accommodation:'ti-building',Activities:'ti-mountain',Other:'ti-dots'};

let S={user:null,users:[],expenses:[],trip:'My Trip',otp:null,otpEmail:null};

function uid(){return Math.random().toString(36).slice(2);}
function fmt(n){return '$'+Math.abs(n).toFixed(2);}
function colorFor(id){const i=S.users.findIndex(u=>u.id===id);return COLORS[i%COLORS.length]||COLORS[0];}
function initials(u){return((u.first||'?')[0]+(u.last||'?')[0]).toUpperCase();}

function avEl(u,cls){
  const c=colorFor(u.id);
  const d=document.createElement('div');
  d.className='av '+(cls||'');
  d.style.background=c.bg;d.style.color=c.fg;
  if(u.avatar){const img=document.createElement('img');img.src=u.avatar;img.alt=initials(u);d.appendChild(img);}
  else d.textContent=initials(u);
  return d;
}

function avHTML(u,cls){
  const c=colorFor(u.id);
  if(u.avatar)return`<div class="av ${cls||''}" style="background:${c.bg};color:${c.fg};overflow:hidden;"><img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/></div>`;
  return`<div class="av ${cls||''}" style="background:${c.bg};color:${c.fg};">${initials(u)}</div>`;
}

function seedDemo(me){
  S.trip=me.tripName||'My Trip';
  const others=[{id:uid(),first:'Sam',last:'Park',email:'sam@demo.com',avatar:null},{id:uid(),first:'Mia',last:'Torres',email:'mia@demo.com',avatar:null},{id:uid(),first:'Leo',last:'Chan',email:'leo@demo.com',avatar:null}];
  S.users=[me,...others];
  const [m,s,mi,l]=S.users.map(u=>u.id);
  S.expenses=[
    {id:uid(),desc:'Hotel night 1',amount:320,category:'Accommodation',paidBy:m,paidFor:[m,s,mi,l],date:'2026-05-10'},
    {id:uid(),desc:'Airport taxi',amount:48,category:'Transport',paidBy:s,paidFor:[m,s,mi,l],date:'2026-05-10'},
    {id:uid(),desc:'Dinner at La Playa',amount:140,category:'Food',paidBy:mi,paidFor:[m,s,mi,l],date:'2026-05-11'},

}

function showLogin(){['loginForm'].forEach(id=>show(id));['otpForm','registerForm'].forEach(id=>hide(id));}
function showOtp(){show('otpForm');hide('loginForm');hide('registerForm');}
function showRegister(){show('registerForm');hide('loginForm');hide('otpForm');}
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

function sendOtp(){
  const email=document.getElementById('loginEmail').value.trim();
  if(!email||!email.includes('@'))return;
  const u=S.users.find(x=>x.email===email);
  if(!u){alert('No account found. Please register.');return;}
  S.otp=String(Math.floor(100000+Math.random()*900000));S.otpEmail=email;
  document.getElementById('otpEmailLabel').textContent=email;
  document.getElementById('otpCodeHint').textContent='Demo code: '+S.otp;
  hide('otpErr');showOtp();
}

function verifyOtp(){
  if(document.getElementById('otpInput').value.trim()===S.otp){
    launch(S.users.find(u=>u.email===S.otpEmail));
  }else{show('otpErr');}
}

function registerUser(){
  const f=v('regFirst'),l=v('regLast'),e=v('regEmail'),t=v('regTrip');
  if(!f||!l||!e||!t){alert('Fill in all fields.');return;}
  if(S.users.find(u=>u.email===e)){alert('Email already registered.');return;}
  const newU={id:uid(),first:f,last:l,email:e,avatar:null,tripName:t};
  seedDemo(newU);launch(newU);
}

function v(id){return document.getElementById(id).value.trim();}

function launch(u){
  S.user=u;
  hide('authScreen');show('mainApp');
  refreshTopbar();navTo('home');
}

function logout(){
  S.user=null;hide('mainApp');show('authScreen');showLogin();
}

function refreshTopbar(){
  const u=S.user;
  document.getElementById('topbarTrip').textContent=S.trip;
  const av=document.getElementById('topbarAvatar');
  const c=colorFor(u.id);
  av.style.background=c.bg;av.style.color=c.fg;
  if(u.avatar){av.innerHTML=`<img src="${u.avatar}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;" alt="${initials(u)}" />`;}
  else av.textContent=initials(u);
}

function navTo(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  show('page-'+name);
  const nb=document.getElementById('nb-'+name);
  if(nb)nb.classList.add('active');
  const titles={home:'Dashboard',expenses:'Expenses',add:'Add expense',settle:'Settlement',members:'Members',profile:'Profile'};
  document.getElementById('topbarTitle').textContent=titles[name]||'SplitTrip';
  if(name==='home')renderHome();
  if(name==='expenses')renderExpenses('all');
  if(name==='add')renderAddForm();
  if(name==='settle')renderSettle();
  if(name==='members')renderMembers();
  if(name==='profile')renderProfile();
}

function goProfile(){navTo('profile');}

function getBalances(){
  const b={};S.users.forEach(u=>b[u.id]=0);
  S.expenses.forEach(e=>{
    const pp=e.amount/e.paidFor.length;
    e.paidFor.forEach(uid=>{if(uid!==e.paidBy){b[e.paidBy]+=pp;b[uid]-=pp;}});
  });return b;
}

function getTotals(){
  const t={};S.users.forEach(u=>t[u.id]=0);
  S.expenses.forEach(e=>t[e.paidBy]+=e.amount);return t;
}

function renderHome(){
  const total=S.expenses.reduce((s,e)=>s+e.amount,0);
  const tots=getTotals();const bals=getBalances();
  const myPaid=tots[S.user.id]||0;const myBal=bals[S.user.id]||0;
  document.getElementById('metricGrid').innerHTML=`
    <div class="metric"><div class="metric-label">Total spent</div><div class="metric-val">${fmt(total)}</div></div>
    <div class="metric"><div class="metric-label">You paid</div><div class="metric-val">${fmt(myPaid)}</div></div>
    <div class="metric"><div class="metric-label">Your balance</div><div class="metric-val ${myBal>=0?'positive':'negative'}">${myBal>=0?'+':'−'}${fmt(myBal)}</div></div>
    <div class="metric"><div class="metric-label">Expenses</div><div class="metric-val">${S.expenses.length}</div></div>`;
  const maxP=Math.max(...Object.values(tots),1);
  document.getElementById('spendBars').innerHTML=S.users.map(u=>{
    const c=colorFor(u.id);const pct=((tots[u.id]||0)/maxP*100).toFixed(1);
    return`<div class="bar-row">${avHTML(u,'av-sm')}<div class="bar-name">${u.first}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c.bg};border:1px solid ${c.fg}30;"></div></div><div class="bar-val">${fmt(tots[u.id]||0)}</div></div>`;
  }).join('');
  const recent=[...S.expenses].reverse().slice(0,5);
  document.getElementById('recentList').innerHTML=recent.length?recent.map(e=>expRowHTML(e)).join(''):`<div style="padding:14px 16px;font-size:14px;color:var(--color-text-secondary);">No expenses yet.</div>`;
}

function expRowHTML(e){
  const payer=S.users.find(u=>u.id===e.paidBy);
  const cc=CAT_COLORS[e.category]||CAT_COLORS.Other;
  const ci=CAT_ICONS[e.category]||'ti-dots';
  return`<div class="exp-row">
    <div class="exp-icon" style="background:${cc.bg};color:${cc.fg};"><i class="ti ${ci}" aria-hidden="true"></i></div>
    <div class="exp-body"><div class="exp-desc">${e.desc}</div><div class="exp-meta">${e.date} · ${payer?payer.first:'?'} · ${e.paidFor.length}p</div></div>
    <div class="exp-amt">${fmt(e.amount)}</div>
    <button class="del-btn" onclick="delExp('${e.id}')" aria-label="Delete"><i class="ti ti-trash" aria-hidden="true"></i></button>
  </div>`;
}

function renderExpenses(cat){
  const list=cat==='all'?S.expenses:S.expenses.filter(e=>e.category===cat);
  document.getElementById('expList').innerHTML=[...list].reverse().map(e=>expRowHTML(e)).join('')||`<div style="padding:14px 16px;font-size:14px;color:var(--color-text-secondary);">No expenses here.</div>`;
}

function filterExp(cat,el){
  document.querySelectorAll('.fpill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');renderExpenses(cat);
}

function delExp(id){S.expenses=S.expenses.filter(e=>e.id!==id);renderExpenses('all');}

function renderAddForm(){
  const pb=document.getElementById('expPaidBy');
  pb.innerHTML=S.users.map(u=>`<option value="${u.id}">${u.first} ${u.last}</option>`).join('');
  pb.value=S.user.id;
  document.getElementById('expPaidFor').innerHTML=S.users.map(u=>`
    <label class="chip on" id="chip-${u.id}">
      <input type="checkbox" value="${u.id}" checked onchange="toggleChip('${u.id}',this)" />
      ${avHTML(u,'av-sm')} ${u.first}
    </label>`).join('');
  document.getElementById('expDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('expDesc').value='';
  document.getElementById('expAmt').value='';
  hide('addErr');
}

function toggleChip(id,cb){document.getElementById('chip-'+id).classList.toggle('on',cb.checked);}

function addExpense(){
  const desc=v('expDesc'),amt=parseFloat(document.getElementById('expAmt').value),cat=document.getElementById('expCat').value,date=document.getElementById('expDate').value,paidBy=document.getElementById('expPaidBy').value;
  const paidFor=Array.from(document.querySelectorAll('#expPaidFor input:checked')).map(c=>c.value);
  const err=document.getElementById('addErr');
  if(!desc){err.textContent='Enter a description.';show('addErr');return;}
  if(!amt||amt<=0){err.textContent='Enter a valid amount.';show('addErr');return;}
  if(!paidFor.length){err.textContent='Select who this was paid for.';show('addErr');return;}
  hide('addErr');
  S.expenses.push({id:uid(),desc,amount:amt,category:cat,date,paidBy,paidFor});
  navTo('expenses');
}

function computeSettlements(){
  const bal=getBalances();
  const creds=[],debts=[];
  Object.entries(bal).forEach(([id,b])=>{if(b>0.005)creds.push({id,a:b});else if(b<-0.005)debts.push({id,a:-b});});
  creds.sort((a,b)=>b.a-a.a);debts.sort((a,b)=>b.a-a.a);
  const txns=[];let ci=0,di=0;
  while(ci<creds.length&&di<debts.length){
    const c=creds[ci],d=debts[di],amt=Math.min(c.a,d.a);
    txns.push({from:d.id,to:c.id,amt});c.a-=amt;d.a-=amt;
    if(c.a<0.005)ci++;if(d.a<0.005)di++;
  }return txns;
}

function renderSettle(){
  const total=S.expenses.reduce((s,e)=>s+e.amount,0);
  const bal=getBalances();
  document.getElementById('settleMetrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total spent</div><div class="metric-val">${fmt(total)}</div></div>
    <div class="metric"><div class="metric-label">Members</div><div class="metric-val">${S.users.length}</div></div>`;
  document.getElementById('balList').innerHTML=S.users.map(u=>{
    const b=bal[u.id]||0;
    const cls=Math.abs(b)<0.01?'':b>0?'positive':'negative';
    const label=Math.abs(b)<0.01?'Settled':b>0?`+${fmt(b)}`:`−${fmt(b)}`;
    return`<div class="settle-row">${avHTML(u)}<div style="flex:1;font-size:14px;font-weight:500;">${u.first} ${u.last}</div><div class="settle-amt ${cls}">${label}</div></div>`;
  }).join('');
  const txns=computeSettlements();
  document.getElementById('settleList').innerHTML=txns.length?txns.map(t=>{
    const fr=S.users.find(u=>u.id===t.from),to=S.users.find(u=>u.id===t.to);
    return`<div class="settle-row">${avHTML(fr)}<span style="font-size:14px;">${fr.first}</span><i class="ti ti-arrow-right" style="font-size:16px;color:var(--color-text-secondary);" aria-hidden="true"></i>${avHTML(to)}<span style="font-size:14px;">${to.first}</span><div class="settle-amt negative">${fmt(t.amt)}</div></div>`;
  }).join(''):`<div style="padding:14px 16px;font-size:14px;color:var(--color-text-secondary);">Everyone is settled up!</div>`;
}

function renderMembers(){
  const tots=getTotals();
  document.getElementById('memberList').innerHTML=S.users.map(u=>`
    <div class="member-row">${avHTML(u)}<div class="member-info"><div class="member-name">${u.first} ${u.last}${u.id===S.user.id?' <span style="font-size:11px;color:var(--color-text-secondary);">(you)</span>':''}</div><div class="member-email">${u.email}</div></div><div style="font-size:12px;color:var(--color-text-secondary);flex-shrink:0;">${fmt(tots[u.id]||0)}</div></div>`).join('');
  hide('inviteMsg');document.getElementById('inviteEmail').value='';
}

function inviteMember(){
  const email=v('inviteEmail');const msg=document.getElementById('inviteMsg');
  if(!email||!email.includes('@')){msg.textContent='Enter a valid email.';msg.style.color='var(--color-text-danger)';show('inviteMsg');return;}
  if(S.users.find(u=>u.email===email)){msg.textContent='Already a member.';msg.style.color='var(--color-text-danger)';show('inviteMsg');return;}
  S.users.push({id:uid(),first:email.split('@')[0],last:'',email,avatar:null});
  document.getElementById('inviteEmail').value='';
  msg.textContent='Invite sent! Member added.';msg.style.color='#1D9E75';show('inviteMsg');
  renderMembers();show('inviteMsg');
}

function renderProfile(){
  const u=S.user;
  const c=colorFor(u.id);
  const av=document.getElementById('profileAv');
  av.style.background=c.bg;av.style.color=c.fg;
  if(u.avatar){av.innerHTML=`<img src="${u.avatar}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;" alt="${initials(u)}" />`;}
  else av.textContent=initials(u);
  document.getElementById('profileName').textContent=u.first+' '+u.last;
  document.getElementById('profileEmailDisp').textContent=u.email;
  document.getElementById('pfFirst').value=u.first;
  document.getElementById('pfLast').value=u.last;
  hide('saveMsg');
}

function uploadAvatar(ev){
  const file=ev.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{S.user.avatar=e.target.result;const idx=S.users.findIndex(u=>u.id===S.user.id);if(idx>=0)S.users[idx].avatar=e.target.result;renderProfile();refreshTopbar();};
  r.readAsDataURL(file);
}

function saveProfile(){
  const f=v('pfFirst'),l=v('pfLast');if(!f)return;
  S.user.first=f;S.user.last=l;
  const idx=S.users.findIndex(u=>u.id===S.user.id);
  if(idx>=0){S.users[idx].first=f;S.users[idx].last=l;}
  renderProfile();refreshTopbar();
  show('saveMsg');setTimeout(()=>hide('saveMsg'),2000);
}

showLogin();
</script>
